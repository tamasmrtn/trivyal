# docker-compose.hub.yml
name: trivyal-hub
services:
  trivyal-hub:
    image: ghcr.io/tamasmrtn/trivyal-hub:latest
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./hub/data:/app/data
    environment:
      TRIVYAL_SECRET_KEY: "change-me-to-a-long-random-string"
      TRIVYAL_DATA_DIR: /app/data
      # TRIVYAL_ADMIN_PASSWORD: "changeme"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: run an agent on the hub host itself to monitor it too
