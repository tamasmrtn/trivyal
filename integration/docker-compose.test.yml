# docker-compose.test.yml — spun up by pytest-docker for integration tests.
# Context is the project root (..); tests run from integration/.
name: trivyal-integration

services:
  hub:
    build:
      context: ..
      dockerfile: hub/Dockerfile
    ports:
      - "18099:8099"
    environment:
      TRIVYAL_SECRET_KEY: "integration-test-secret-key-32x!"
      TRIVYAL_ADMIN_PASSWORD: "testpassword"
      TRIVYAL_DATA_DIR: /tmp/trivyal-test
      TRIVYAL_ACCEPTANCE_EXPIRY_INTERVAL: "2"
    tmpfs:
      - /tmp/trivyal-test:mode=1777    # ephemeral SQLite DB — wiped on every compose run
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8099/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 20s
