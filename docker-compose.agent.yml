# docker-compose.agent.yml
name: trivyal-agent
services:
  trivyal-agent:
    image: ghcr.io/tamasmrtn/trivyal-agent:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./agent/data:/app/data
    environment:
      TRIVYAL_HUB_URL: "${TRIVYAL_HUB_URL:-ws://localhost:8099}"
      TRIVYAL_TOKEN: "${AGENT_TOKEN}"
      TRIVYAL_KEY: "${AGENT_HUB_KEY}"
      TRIVYAL_SCAN_SCHEDULE: "${TRIVYAL_SCAN_SCHEDULE:-0 2 * * *}"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import trivyal_agent"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
