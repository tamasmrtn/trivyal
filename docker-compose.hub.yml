# docker-compose.hub.yml
name: trivyal-hub
services:
  trivyal-hub:
    image: ghcr.io/tamasmrtn/trivyal-hub:latest
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./hub/data:/app/data
    environment:
      TRIVYAL_SECRET_KEY: "change-me-to-a-long-random-string"
      TRIVYAL_DATA_DIR: /app/data
      # TRIVYAL_ADMIN_PASSWORD: "changeme"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8099/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
