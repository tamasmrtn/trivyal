name: CI

on:
  pull_request:

permissions: {}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      hub: ${{ steps.filter.outputs.hub }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "hub=$(echo "$CHANGED" | grep -qE '^(hub|ui)/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "agent=$(echo "$CHANGED" | grep -qE '^agent/' && echo true || echo false)" >> $GITHUB_OUTPUT

  dep-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Audit hub Python deps
        run: |
          cd hub && uv export --no-dev --no-hashes -o /tmp/hub-reqs.txt
          uv tool run pip-audit -r /tmp/hub-reqs.txt --strict
      - name: Audit agent Python deps
        run: |
          cd agent && uv export --no-dev --no-hashes -o /tmp/agent-reqs.txt
          uv tool run pip-audit -r /tmp/agent-reqs.txt --strict
      - name: Audit UI npm deps
        run: cd ui && npm ci && npm audit --audit-level=high

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --prefix ui
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: pre-commit/action@v3.0.1

  test-hub:
    name: Test hub
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "hub/uv.lock"
      - run: uv sync
        working-directory: hub
      - run: uv run pytest tests/ -vv --cov=trivyal_hub --cov-report=term --cov-fail-under=75
        working-directory: hub

  test-agent:
    name: Test agent
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "agent/uv.lock"
      - run: uv sync
        working-directory: agent
      - run: uv run pytest tests/ -vv --cov=trivyal_agent --cov-report=term --cov-fail-under=75
        working-directory: agent

  test-ui:
    name: Test UI
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run test:coverage
        working-directory: ui

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [changes, test-hub, test-agent, test-ui]
    if: needs.changes.outputs.hub == 'true' || needs.changes.outputs.agent == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "integration/uv.lock"
      - run: uv sync
        working-directory: integration
      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up --build --wait -d
          uv run pytest tests/ -v --tb=short -m "not load"
          EXIT=$?
          docker compose -f docker-compose.test.yml down -v
          exit $EXIT
        working-directory: integration

  test-e2e:
    name: E2E browser tests
    runs-on: ubuntu-latest
    needs: [changes, test-hub, test-agent, test-ui]
    if: needs.changes.outputs.hub == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Start hub
        run: docker compose -f integration/docker-compose.test.yml up --build --wait -d
      - name: Run E2E tests
        run: npm test
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:18099
          E2E_ADMIN_PASSWORD: testpassword
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/test-results/
      - name: Teardown
        if: always()
        run: docker compose -f integration/docker-compose.test.yml down -v

  scan-hub:
    name: Build and scan hub image (Trivy)
    needs: [changes, test-integration]
    if: needs.changes.outputs.hub == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/Dockerfile
          load: true
          tags: trivyal-hub:scan
          cache-from: type=gha
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: trivyal-hub:scan
          format: table
          output: trivy-hub.txt
          hide-progress: true
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Append Trivy table to job summary (hub)
        if: always()
        run: |
          if [ -s trivy-hub.txt ]; then
            echo "### Trivy scan — hub image" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-hub.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Trivy produced no table output for hub" >> $GITHUB_STEP_SUMMARY
          fi

  scan-agent:
    name: Build and scan agent image (Trivy)
    needs: [changes, test-integration]
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: agent/Dockerfile
          load: true
          tags: trivyal-agent:scan
          cache-from: type=gha
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: trivyal-agent:scan
          format: table
          output: trivy-agent.txt
          hide-progress: true
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Append Trivy table to job summary (agent)
        if: always()
        run: |
          if [ -s trivy-agent.txt ]; then
            echo "### Trivy scan — agent image" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-agent.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Trivy produced no table output for agent" >> $GITHUB_STEP_SUMMARY
          fi
