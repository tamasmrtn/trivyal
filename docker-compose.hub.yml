# docker-compose.hub.yml
name: trivyal-hub

services:
  init-permissions:
    image: busybox:1.37.0
    container_name: ${ENVIRONMENT:-dev}-trivyal-hub-init-permissions
    volumes:
      - ./hub/data:/app/data
    command: chown -R ${PUID:-1000}:${PGID:-1000} /app/data
    user: root
    cap_add:
      - CHOWN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
  trivyal-hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    container_name: ${ENVIRONMENT:-dev}-trivyal-hub
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./hub/data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TRIVYAL_SECRET_KEY: "change-me-to-a-long-random-string"
      TRIVYAL_ADMIN_PASSWORD: "change-me"
      TRIVYAL_DATA_DIR: /app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8099/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    user: "${PUID:-1000}:${PGID:-1000}"
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /run:noexec,nosuid,size=50M
