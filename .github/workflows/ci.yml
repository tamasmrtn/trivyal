name: CI

on:
  pull_request:

permissions: {}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      hub: ${{ steps.filter.outputs.hub }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "hub=$(echo "$CHANGED" | grep -qE '^(hub|ui)/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "agent=$(echo "$CHANGED" | grep -qE '^agent/' && echo true || echo false)" >> $GITHUB_OUTPUT

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --prefix ui
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: pre-commit/action@v3.0.1

  test-hub:
    name: Test hub
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "hub/uv.lock"
      - run: uv sync
        working-directory: hub
      - run: uv run pytest tests/ -vv
        working-directory: hub

  test-agent:
    name: Test agent
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "agent/uv.lock"
      - run: uv sync
        working-directory: agent
      - run: uv run pytest tests/ -vv
        working-directory: agent

  test-ui:
    name: Test UI
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run test:run
        working-directory: ui

  build-hub:
    name: Build hub image
    needs: [changes, test-hub, test-ui]
    if: needs.changes.outputs.hub == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: hub/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agent:
    name: Build agent image
    needs: [changes, test-agent]
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
