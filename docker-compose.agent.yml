# docker-compose.agent.yml
# Required secrets (copy .env.example → .env for local dev):
#   TRIVYAL_TOKEN - agent registration token from hub UI
#   TRIVYAL_KEY   - hub's Ed25519 public key
#   DOCKER_GID    - GID of /var/run/docker.sock on the host (stat -c '%g' /var/run/docker.sock)

name: trivyal-agent

services:
  init-permissions:
    image: busybox:1.37.0
    container_name: ${ENVIRONMENT:-dev}-trivyal-agent-init-permissions
    volumes:
      - ./agent/data:/app/data
    command: chown -R ${PUID:-1000}:${PGID:-1000} /app/data
    user: root
    cap_add:
      - CHOWN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
  trivyal-agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: ${ENVIRONMENT:-dev}-trivyal-agent
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./agent/data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TRIVYAL_HUB_URL: "${TRIVYAL_HUB_URL:-ws://localhost:8099}"
      TRIVYAL_TOKEN: ${TRIVYAL_TOKEN}
      TRIVYAL_KEY: ${TRIVYAL_KEY}
      TRIVYAL_SCAN_SCHEDULE: "${TRIVYAL_SCAN_SCHEDULE:-0 2 * * *}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8100/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    user: "${PUID:-1000}:${PGID:-1000}"
    group_add:
      - "${DOCKER_GID:-999}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
