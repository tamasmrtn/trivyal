name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 0.2.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump version and open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run bump script
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh ${{ inputs.version }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install UI dependencies
        run: npm install --prefix ui

      - name: Commit and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/release-v${{ inputs.version }}
          pre-commit run --all-files || pre-commit run --all-files
          git add hub/pyproject.toml agent/pyproject.toml integration/pyproject.toml ui/package.json hub/uv.lock agent/uv.lock
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin chore/release-v${{ inputs.version }}

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump to \`v${{ inputs.version }}\`. Merge this PR to trigger the release." \
            --base main \
            --head chore/release-v${{ inputs.version }}
